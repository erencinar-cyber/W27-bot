name: W27 Yurt Botu

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Kodlari Getir
        uses: actions/checkout@v3

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Gerekli Kutuphaneleri Kur
        run: pip install requests selenium

      - name: Botu Calistir
        run: python w27_bot.py

      - name: Hafizayi Kaydet
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          touch hafiza.txt
          git add hafiza.txt
          git diff-index --quiet HEAD || git commit -m "Hafiza guncellendi"
          git push
